version: '3.8'

# Dev environment - Unraid / local development
services:
  postgres:
    image: postgres:15
    container_name: rezsi-postgres-dev
    restart: unless-stopped
    environment:
      - POSTGRES_DB=rezsi_dev
      - POSTGRES_USER=rezsi_user
      - POSTGRES_PASSWORD=${REZSI_DB_PASSWORD:-devpassword}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rezsi_user -d rezsi_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rezsi-net

  rezsi-app:
    build: .
    container_name: rezsi-app-dev
    restart: unless-stopped
    labels:
      - "net.unraid.docker.webui=http://[IP]:[PORT:5003]/"
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/rpallagi/rezsifigyelo/main/static/img/icon-192.png"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5003:5003"
    environment:
      - FLASK_PORT=5003
      - FLASK_ENV=development
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=postgresql://rezsi_user:${REZSI_DB_PASSWORD:-devpassword}@postgres:5432/rezsi_dev
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - ./uploads:/app/uploads
      - .:/app:ro  # Mount source code for hot reload in dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rezsi-net

volumes:
  postgres-data:

networks:
  rezsi-net:
    driver: bridge
