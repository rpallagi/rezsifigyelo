# Dev environment - Unraid / local development
# Flask API (port 5003) + React Vite dev server (port 5173)
services:
  postgres:
    image: postgres:15
    container_name: rezsi-postgres-dev
    restart: unless-stopped
    environment:
      - POSTGRES_DB=rezsi_dev
      - POSTGRES_USER=rezsi_user
      - POSTGRES_PASSWORD=${REZSI_DB_PASSWORD:-devpassword}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rezsi_user -d rezsi_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rezsi-net

  rezsi-app:
    build: .
    container_name: rezsi-app-dev
    restart: unless-stopped
    labels:
      - "net.unraid.docker.webui=http://[IP]:[PORT:5173]/"
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/rpallagi/rezsifigyelo/main/static/img/icon-192.png"
      - "net.unraid.docker.managed=compose"
      - "org.opencontainers.image.title=Rezsi Követés"
      - "org.opencontainers.image.description=Közüzemi mérőállás nyilvántartó és ingatlankezelő"
      - "org.opencontainers.image.version=2.0.0"
      - "org.opencontainers.image.source=https://github.com/rpallagi/rezsifigyelo"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5003:5003"
      - "5173:5173"
    environment:
      - FLASK_PORT=5003
      - FLASK_ENV=development
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=postgresql://rezsi_user:${REZSI_DB_PASSWORD:-devpassword}@postgres:5432/rezsi_dev
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TTN_WEBHOOK_TOKEN=${TTN_WEBHOOK_TOKEN:-}
      - TTN_WEBHOOK_ENABLED=${TTN_WEBHOOK_ENABLED:-true}
      - MQTT_ENABLED=${MQTT_ENABLED:-true}
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-mosquitto}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT:-1883}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - MQTT_TOPIC_PREFIX=${MQTT_TOPIC_PREFIX:-zigbee2mqtt/#,rezsi/#,shellies/#}
      - OCR_PROVIDER=${OCR_PROVIDER:-claude}
    volumes:
      - ./uploads:/app/uploads
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rezsi-net

  # MQTT broker — okos mérő integráció (ESP32, Zigbee2MQTT, Shelly)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: rezsi-mosquitto
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "1883:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - rezsi-net

volumes:
  postgres-data:
  mosquitto-data:

networks:
  rezsi-net:
    driver: bridge
