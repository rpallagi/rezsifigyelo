version: '3.8'

# Production environment - VPS deployment with nginx + SSL
services:
  postgres:
    image: postgres:15
    container_name: rezsi-postgres-prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=rezsi_prod
      - POSTGRES_USER=rezsi_user
      - POSTGRES_PASSWORD=${REZSI_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rezsi_user -d rezsi_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rezsi-net

  rezsi-app:
    build: .
    container_name: rezsi-app-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5003"
    environment:
      - FLASK_PORT=5003
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://rezsi_user:${REZSI_DB_PASSWORD}@postgres:5432/rezsi_prod
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - uploads:/app/uploads
    networks:
      - rezsi-net

  nginx:
    image: nginx:alpine
    container_name: rezsi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/rezsifigyelo.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
      - uploads:/app/uploads:ro
    depends_on:
      - rezsi-app
    networks:
      - rezsi-net

  certbot:
    image: certbot/certbot
    container_name: rezsi-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres-data:
  uploads:
  certbot-conf:
  certbot-www:

networks:
  rezsi-net:
    driver: bridge
