# Rezsi Figyelo - Nginx configuration
# Production: rezsikovetes.hu

server {
    listen 80;
    server_name rezsikovetes.hu www.rezsikovetes.hu;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name rezsikovetes.hu www.rezsikovetes.hu;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/rezsikovetes.hu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rezsikovetes.hu/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Upload limit (meter photos)
    client_max_body_size 10M;

    # Static files
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Uploaded photos
    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
    }

    # Proxy to Flask/Gunicorn
    location / {
        proxy_pass http://rezsi-app:5003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }
}
