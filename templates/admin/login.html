{% extends "base.html" %}
{% block title %}Admin bejelentkezes - Rezsi Figyelo{% endblock %}
{% block body_class %}admin-login{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>Admin</h1>
            <p>Rezsi Figyelo kezelese</p>
        </div>

        <form method="POST" action="{{ url_for('admin.admin_login') }}" class="login-form">
            <div class="form-group">
                <label for="username">Felhasznalonev</label>
                <input type="text" name="username" id="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Jelszo</label>
                <input type="password" name="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Bejelentkezes</button>
        </form>

        <div class="login-footer">
            <a href="{{ url_for('tenant.index') }}">&larr; Berloi bejelentkezes</a>
        </div>
    </div>
</div>
{% endblock %}
